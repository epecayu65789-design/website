<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AmplifAI // Internal Data Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f19; }
    </style>
</head>
<body class="text-gray-100 p-8">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-white">Central User Database</h1>
                <p class="text-sm text-gray-400">Live incoming user analytics and profile data</p>
            </div>
            <button onclick="fetchAdminData()" class="bg-indigo-600 hover:bg-indigo-500 text-sm font-semibold px-4 py-2 rounded-xl transition cursor-pointer">
                Refresh Records
            </button>
        </div>

        <!-- Data Table Container -->
        <div class="bg-gray-900/60 border border-gray-800 rounded-2xl overflow-hidden backdrop-blur-xl">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="border-b border-gray-800 bg-gray-900/80 text-xs font-semibold uppercase tracking-wider text-gray-400">
                        <th class="p-4">Full Name</th>
                        <th class="p-4">Selected Channel</th>
                        <th class="p-4">Projected Growth</th>
                        <th class="p-4">Submission Date</th>
                    </tr>
                </thead>
                <tbody id="data-table-body" class="text-sm divide-y divide-gray-800/50">
                    <!-- Dynamic Data Injected Here -->
                    <tr>
                        <td colspan="4" class="p-8 text-center text-gray-500">Loading incoming data streams...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function fetchAdminData() {
            const tableBody = document.getElementById('data-table-body');
            try {
                const response = await fetch('/api/admin/data');
                const data = await response.json();

                if (!response.ok) throw new Error('Data fetch failed');

                if (data.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-gray-500">No user submissions found yet.</td></tr>`;
                    return;
                }

                tableBody.innerHTML = ''; // Clear loading row
                data.forEach(user => {
                    const date = new Date(user.createdAt).toLocaleString();
                    const row = `
                        <tr class="hover:bg-white/5 transition">
                            <td class="p-4 font-semibold text-white">${user.firstName} ${user.lastName}</td>
                            <td class="p-4 text-indigo-400">${user.channel}</td>
                            <td class="p-4 text-green-400 font-bold">+${user.projectedFollowers.toLocaleString()}</td>
                            <td class="p-4 text-gray-500 text-xs">${date}</td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });
            } catch (error) {
                tableBody.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-red-400">Error loading dashboard data.</td></tr>`;
            }
        }

        // Auto-fetch data on page load
        document.addEventListener('DOMContentLoaded', fetchAdminData);
    </script>
</body>
</html>
